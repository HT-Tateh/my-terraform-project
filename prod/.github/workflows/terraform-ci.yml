name: Terraform CI — Validate & Plan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  TF_VERSION: '1.7.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ opt into Node.js 24 now

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2          # ✅ updated

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2 # ✅ updated
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  plan-dev:
    name: Plan — DEV Environment
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4.2.2          # ✅ updated

      - uses: hashicorp/setup-terraform@v3.1.2 # ✅ updated
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Terraform Init & Plan (dev)
        working-directory: dev
        run: |
          terraform init -backend=false
          terraform plan -input=false -lock=false

  plan-prod:
    name: Plan — PROD Environment
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4.2.2          # ✅ updated

      - uses: hashicorp/setup-terraform@v3.1.2 # ✅ updated
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Terraform Init & Plan (prod)
        working-directory: prod
        run: |
          terraform init -backend=false
          terraform plan -input=false -lock=false

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [validate, plan-dev, plan-prod]
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "Branch:         ${{ github.ref_name }}"
          echo "Commit:         ${{ github.sha }}"
          echo "Run:            #${{ github.run_number }}"
          echo "Actor:          ${{ github.actor }}"
          echo "Envs validated: dev, prod"