name: Terraform CI — Validate & Plan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:                                    # FIX 1: defined TF_VERSION (was referenced but never set)
  TF_VERSION: '1.7.0'

jobs:
  validate:                             # FIX 2: renamed from 'terraform' to 'validate' (plan jobs used needs: validate)
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  plan-dev:
    name: Plan — DEV Environment
    runs-on: ubuntu-latest
    needs: validate                     # FIX 3: now resolves correctly to the 'validate' job above
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init & Plan (dev)
        working-directory: dev          # FIX 4: moved working-directory inside the step, not as its own step
        run: |
          terraform init -backend=false
          terraform plan -input=false -lock=false

  plan-prod:
    name: Plan — PROD Environment
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init & Plan (prod)
        working-directory: prod         # FIX 4: same fix as dev
        run: |
          terraform init -backend=false
          terraform plan -input=false -lock=false

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [validate, plan-dev, plan-prod]  # FIX 5: proper indentation under jobs
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "Branch:         ${{ github.ref_name }}"
          echo "Commit:         ${{ github.sha }}"
          echo "Run:            #${{ github.run_number }}"
          echo "Actor:          ${{ github.actor }}"
          echo "Envs validated: dev, prod"